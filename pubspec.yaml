name: parental_control_app
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.0.0
  shared_preferences: ^2.3.2
  dartz: ^0.10.1
  firebase_auth: ^6.0.1
  cloud_firestore: ^6.0.0
  bloc: ^9.0.0
  flutter_bloc: ^9.0.0
  equatable: ^2.0.0
  provider: ^6.0.5
  get_it: ^8.2.0
  qr_flutter: ^4.0.0
  mobile_scanner: ^7.0.1
  permission_handler: ^12.0.1
  device_info_plus: ^11.5.0
  package_info_plus: ^8.3.1
  uuid: ^4.5.1
  
  # Icon Launcher
  flutter_launcher_icons: ^0.14.4

  # Native Spalsh Screen
  flutter_native_splash: ^2.4.7
  
  # Location & Maps
  geolocator: ^14.0.2
  geocoding: ^3.0.0
  google_maps_flutter: ^2.9.0
  google_maps_flutter_platform_interface: ^2.8.0
  geofence_service: ^6.0.0

  # Notifications & messaging
  flutter_local_notifications: ^19.4.0
  firebase_messaging: ^16.0.0
  app_settings: ^6.1.1
  
  # AI Chatbot
  google_generative_ai: ^0.4.7
  
  # Cloud Functions (for privileged writes/validations)
  cloud_functions: ^6.0.0

  # JSON serialization
  json_annotation: ^4.9.0

  # Networking & APIs
  http: ^1.2.2
  connectivity_plus: ^6.0.5

  # SMS, Telephony & Audio
  flutter_sms_inbox: ^1.0.3
  # telephony: ^0.2.0  # Commented out due to permission conflicts
  audioplayers: ^6.0.0
  call_log: ^6.0.1
  flutter_contacts: ^1.1.7
  # contacts_service: ^0.6.3  # Commented out due to namespace error
  
  # URL tracking and web browsing
  webview_flutter: ^4.9.0
  url_launcher: ^6.3.1
  
  # Usage Stats for tracking browser activity - temporarily disabled due to build issues
  # usage_stats: ^1.1.0
  
  # Path provider for file operations
  path_provider: ^2.1.2
  
  # Flutter SMS for messaging
  
  # Device Apps - Get installed apps list (Pure Flutter, no native code needed)
  device_apps: ^2.2.0
  
  # Background Tasks - Temporarily disabled due to compatibility issues
  # workmanager: ^0.5.1

  # Reactive Streams
  rxdart: ^0.28.0


  # Date/Time Formatting
  intl: ^0.19.0
  
  # Image Picker
  image_picker: ^1.1.2
  
  # Battery Info
  battery_plus: ^6.0.1

  # PDF Generation & Charts
  pdf: ^3.11.1
  printing: ^5.13.3
  fl_chart: ^0.69.0
  share_plus: ^10.1.2


dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  
  # JSON serialization code generation
  json_serializable: ^6.8.0
  build_runner: ^2.4.10

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/logo.png"

  adaptive_icon_background: "#FFFFFF"   # ya tumhara brand color
  adaptive_icon_foreground: assets/logo/logo.png

flutter_native_splash:
  android: true
  ios: true
  color: "#ffffff"
  image: "assets/images/Splash_Screen_Logo-01.png"
  branding: "assets/images/Splash_Branding_logo-01.png"

  android_gravity: fill   # full screen on pre-Android 12
  android_12:
    color: "#ffffff"
    image: "assets/images/Splash_Screen_Logo-01.png"
    branding: "assets/images/Splash_Branding_logo-01.png"

flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font.
  # For example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
